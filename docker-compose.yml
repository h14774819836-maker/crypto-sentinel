services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto_sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d crypto_sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://sentinel:sentinel@db:5432/crypto_sentinel
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python -m alembic upgrade head"
    volumes:
      - .:/app

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://sentinel:sentinel@db:5432/crypto_sentinel
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://sentinel:sentinel@db:5432/crypto_sentinel
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: sh -c "python -m app.worker.main"
    volumes:
      - .:/app

volumes:
  pg_data:
